<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Test</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css"
</head>
<body>
    <table id="grid">

    </table>        

    <div id="inputDiv">
        <label for="xInput">Grid Size X</label>
        <input name="xInput" type="number" id="xInput"> <!-- Event listener is "on input", not "click" or whatever-->

        <label for="yInput">Grid Size Y</label>
        <input name="yInput" type="number" id="yInput">        
    </div>       

    <div id="tipsDiv">
        <div style="background-color: red;" class="tip">Left Click for Walls!</div>
        <div style="background-color: green;" class="tip">Right Click for End!</div>
        <div style="background-color: yellow;" class="tip">Middle Click for Start!</div>            
    </div>

    <div id="startBtnDiv">
        <button id="startBtn">Start!</button>
    </div>
    
</body>
</html>
